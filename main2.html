<!DOCTYPE html>
<html lang="en-US">
    <header>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">

    </header>
    <body>
        
            <form method="post">
                <h1>Application For Permission To Date My Daughter</h1>
                <h2>Note: Form is to be completed at least 21 days prior to date</h2>
                <fieldset>
                    <legend>Personal Details</legend>
                    <label for="name" name="name" value="Enter your name">Name:</label>
                    <input type="text" id="name" placeholder="Enter your name">
                    <br>
                    <label for="address" name="address" value="Enter your address">Address:</label>
                    <input type="text" id="address" placeholder="Enter your address">
                    <br>
                    <label for="email" name="email" value="Enter your Email">Email:</label>
                    <input type="text" id="email" placeholder="Enter your email">
                    <br>
                    <label for="phone-number" name="phone number" value="Enter your phone number">Phone Number:</label>
                    <input type="text" id="phone-number" placeholder="Enter your phone number">
                    <br>
                    <label for="IQ" name="IQ" value="Enter your IQ">IQ:</label>
                    <input type="text" id="IQ" placeholder="Enter your IQ">
                    <br>
                    <input type="radio" id="Male">
                    <label for="Male">Male</label>
                    <br>
                    <input type="radio" id="Female">
                    <label for="Female">Female</label>
                    <br>
                    <input type="radio" id="Other">
                    <label for="Other">Other</label>
                    <br>
                    <label for="date">Date Of Proposed Outing:</label>
                    <input type="datetime-local" id="date">
                </fieldset>
                <fieldset>
                    <label>Check All That Apply</label>
                    <br>
                    <input type="checkbox" id="tattoo">
                    <label for="tattoo">I have tattoos and/or piercings</label>
                    <br>
                    <input type="checkbox" id="older">
                    <label for="older">I am more than 2 years older than my daughter</label>
                    <br>
                    <input type="checkbox" id="van">
                    <label for="van">I own a panel van or V8 ute</label>
                    <br>
                    <input type="checkbox" id="fulltime">
                    <label for="fulltime">I work full-time</label>
                    <br>
                    <input type="checkbox" id="rich">
                    <label for="rich">My parents are rich</label>
                    <br>
                    <input type="checkbox" id="public">
                    <label for="public">Is the date at a well lit public location</label>
                </fieldset>
                <fieldset>
                    <label for="political">Political Persuasion:</label>
                    <select id="political" name="political">
                        <option value="Left Wing">Left Wing</option>
                        <option value="Right Wing">Right Wing</option>
                        <option value="Conservative">Conservative</option>
                        <option value="Nazi">Nazi</option>
                    </select>
                    <label for="education">Education Level Completed</label>
                    <select id="education" name="education">
                        <option value="university">University</option>
                        <option value="High School">High School</option>
                        <option value="College">College</option>
                        <option value="None">None</option>
                    </select>
                </fieldset>
                <fieldset>
                    <legend>Essay Section</legend>
                    <label for="explanation">In 50 words or more explain why you want to date my daughter</label>
                    <br>
                    <textarea name="explanation" rows="5" cols="40" placeholder="Enter Text Here"></textarea>
                    <br>
                    <label for="upload">Please upload contact details for 2 references</label>
                    <br>
                    <textarea name="upload" rows="5" cols="40" placeholder="Enter Text Here"></textarea>
                    <br>
                    <label for="attach">Upload Police Clearance Certificate, Bank Statement and Medical Certifiates here:</label>
                    <button type="button" onclick="alert('Hi bitch')">Attach Files</button>
                </fieldset>
                <div>
                    <button type="button" onclick="alert('Thank u, next')">Send Your Application</button>
                </div>
                
            </form>
        </div>
    </body>
